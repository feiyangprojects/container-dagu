name: DockerImage

on:
  schedule:
    - cron:  '0 17 * * 5'
  workflow_dispatch:

jobs:
  docker-build:
    name: docker-${{ matrix.image.name }} (${{ matrix.platform.value }})
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          # - name: latest
          #   dockerfile: Dockerfile
          # - name: dev
          #   dockerfile: Dockerfile.dev
          - name: alpine
            dockerfile: Dockerfile.alpine
        platform:
          - value: linux/amd64
            runner: ubuntu-latest
            digest_suffix: linux-amd64
            qemu: false
          - value: linux/arm64
            runner: ubuntu-24.04-arm
            digest_suffix: linux-arm64
            qemu: false
          - value: linux/arm/v7
            runner: ubuntu-24.04-arm
            digest_suffix: linux-arm-v7
            qemu: true
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Extract version from tag
        env:
          CONTAINER_REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
        id: get_version
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          echo "IMAGE_NAME=ghcr.io/$CONTAINER_REGISTRY_USERNAME/${GITHUB_REPOSITORY##*-}" >> $GITHUB_ENV
          # Remove 'v' prefix from tag
          VERSION="$(curl 'https://api.github.com/repos/dagucloud/dagu/tags' | jq -r '.[0].name[1:]')"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Detect prerelease (version contains '-')
          if [[ "$VERSION" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi
          git clone -b "v$VERSION" https://github.com/dagucloud/dagu.git
          cd dagu
          find ../patches -type f -exec git am {} \;

      - name: Set up QEMU
        if: ${{ matrix.platform.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: ${{ matrix.platform.value }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: dagu
          file: dagu/${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform.value }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            LDFLAGS=-s -w -X 'main.version=${{ env.VERSION }}'

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/digests/${{ matrix.image.name }}"
          digest="${{ steps.build.outputs.digest }}"
          if [ -z "$digest" ]; then
            echo "::error::Build digest output is empty"
            exit 1
          fi
          touch "${RUNNER_TEMP}/digests/${{ matrix.image.name }}/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image.name }}-${{ matrix.platform.digest_suffix }}
          path: ${{ runner.temp }}/digests/${{ matrix.image.name }}/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: docker-${{ matrix.image.name }} manifest
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          # - name: latest
          #   tag_suffix: ""
          #   channel_tag: latest
          # - name: dev
          #   tag_suffix: "-dev"
          #   channel_tag: dev
          - name: alpine
            tag_suffix: "-alpine"
            channel_tag: alpine
    steps:
      - name: Extract version from tag
        env:
          CONTAINER_REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
        run: |
          echo "IMAGE_NAME=ghcr.io/$CONTAINER_REGISTRY_USERNAME/${GITHUB_REPOSITORY##*-}" >> $GITHUB_ENV
          # Remove 'v' prefix from tag
          VERSION="$(curl 'https://api.github.com/repos/dagucloud/dagu/tags' | jq -r '.[0].name[1:]')"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Detect prerelease (version contains '-')
          if [[ "$VERSION" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-${{ matrix.image.name }}-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}

      - name: Create manifest
        run: |
          set -euo pipefail

          tags=(-t "${IMAGE_NAME}:${VERSION}${{ matrix.image.tag_suffix }}")
          if [[ "$IS_PRERELEASE" == "false" ]]; then
            tags+=(-t "${IMAGE_NAME}:${{ matrix.image.channel_tag }}")
          fi

          images=()
          while IFS= read -r digest_file; do
            digest="$(basename "$digest_file")"
            images+=("${IMAGE_NAME}@sha256:${digest}")
          done < <(find "${RUNNER_TEMP}/digests" -type f | sort)

          if [ "${#images[@]}" -eq 0 ]; then
            echo "::error::No digests found for ${{ matrix.image.name }}"
            exit 1
          fi

          docker buildx imagetools create "${tags[@]}" "${images[@]}"
